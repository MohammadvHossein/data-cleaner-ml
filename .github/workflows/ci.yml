name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -e .[all]

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 clean_data_ml/ --max-line-length=120 --ignore=E402,W503

      - name: Test import
        run: |
          python -c "from clean_data_ml import DataCleaner; print('Import OK')"

      - name: Run tests
        run: |
          pip install pytest pytest-cov
          pytest tests/ --cov=clean_data_ml --tb=short

      - name: Run example
        run: |
          python example_train.py
          python example_inference.py
