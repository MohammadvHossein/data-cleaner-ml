name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install test & lint tools
        run: |
          pip install flake8 pytest pytest-cov

      - name: Install optional extras (plot, imbalance)
        continue-on-error: true
        run: |
          pip install -e .[all]

      - name: Lint with flake8
        run: |
          flake8 clean_data_ml/ --max-line-length=120 --ignore=E402,W503

      - name: Test import
        run: |
          python -c "from clean_data_ml import DataCleaner; print('Import OK')"

      - name: Run tests
        run: |
          pytest tests/ --cov=clean_data_ml --tb=short -x

      - name: Run example
        run: |
          python example_train.py
          python example_inference.py
